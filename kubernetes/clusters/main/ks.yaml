---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps
  namespace: flux-system
spec:
  decryption:
    provider: sops
  deletionPolicy: WaitForTermination
  interval: 1h
  path: ./kubernetes/apps/main
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  # Level 1 substitution: runs when cluster-apps processes child ks.yaml FILES.
  # Use this to resolve variables that appear as VALUES inside child ks.yaml
  # postBuild.substitute blocks (e.g. CLOUDFLARED_TUNNEL_ID: ${MAIN_CLOUDFLARE_TUNNEL_ID}).
  # Variables here are available when Flux writes the child Kustomization objects
  # to the cluster, before those child KS's reconcile their own resources.
  postBuild:
    substitute:
      CLUSTER: main
    substituteFrom:
      - kind: Secret
        name: cluster-secrets
  patches:
    - # Add Kustomization defaults for all child Kustomizations
      # Level 2 substitution: injected into every child KS's own postBuild.
      # Runs when each child KS processes its app resources (HelmReleases, etc.).
      # Variables here are available inside helmrelease values, httproutes, etc.
      # Does NOT affect how cluster-apps resolves values in the child ks.yaml files
      # themselves — that is handled by the Level 1 postBuild above.
      patch: |-
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: not-used
        spec:
          decryption:
            provider: sops
          deletionPolicy: WaitForTermination
          patches:
            - patch: |-
                apiVersion: helm.toolkit.fluxcd.io/v2
                kind: HelmRelease
                metadata:
                  name: _
                spec:
                  install:
                    crds: CreateReplace
                  rollback:
                    cleanupOnFail: true
                    recreate: true
                  upgrade:
                    cleanupOnFail: true
                    crds: CreateReplace
                    strategy:
                      name: RemediateOnFailure
                    remediation:
                      remediateLastFailure: true
                      retries: 2
              target:
                group: helm.toolkit.fluxcd.io
                kind: HelmRelease
          postBuild:
            substitute:
              NFS_ADDR: "192.168.1.161"
            substituteFrom:
              - name: cluster-secrets
                kind: Secret
                optional: false
      target:
        group: kustomize.toolkit.fluxcd.io
        kind: Kustomization