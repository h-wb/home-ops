---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: plugin-barman-cloud
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.7.0
    digest: sha256:4dd2266e829a4d7bdeb79392d4aeec2a80f9933ed8805faee6545a7a0a241a18
  url: oci://ghcr.io/cloudnative-pg/charts/plugin-barman-cloud
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app plugin-barman-cloud
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    certificate:
      # Renew 22 days before expiry (must be > 21d alert threshold)
      renewBefore: 528h
    resources:
      requests:
        cpu: 20m
        memory: 96Mi
