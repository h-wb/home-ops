---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-gateway
spec:
  dependsOn:
    - name: certificates-import
  interval: 1h
  path: ./kubernetes/apps/main/network/envoy-gateway/app
  postBuild:
    substitute:
      CLUSTER: ${CLUSTER}
      EXTERNAL_DOMAIN: external
      INTERNAL_DOMAIN: internal
      SVC_GATEWAY_EXTERNAL: 192.168.1.201
      SVC_GATEWAY_INTERNAL: 192.168.1.202
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: network
  wait: false