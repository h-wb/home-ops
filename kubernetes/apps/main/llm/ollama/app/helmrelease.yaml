---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ollama
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 1h
  values:
    defaultPodOptions:
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: ollama-gpu
    controllers:
      ollama:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ollama/ollama
              tag: 0.31.2@sha256:509fdf54e23bd50d87af646cb51c0a7a203d6a83cc4d6695b3b08c5be1c62c0a
            securityContext:
              privileged: true
            env:
              TZ: Europe/Paris
              OLLAMA_NUM_PARALLEL: 1
              OLLAMA_VULKAN: 1
              # OLLAMA_CONTEXT_LENGTH: "64000"
              OLLAMA_DEBUG: 1
              OLLAMA_KV_CACHE_TYPE: q8_0
              OLLAMA_FLASH_ATTENTION: 1
              GGML_VK_DISABLE_INTEGER_DOT_PRODUCT: 1
            resources:
              claims:
                - name: gpu
              requests:
                cpu: 200m
                memory: 4Gi
              limits:
                memory: 24Gi
          exporter:
            image:
              repository: lucabecker42/ollama-exporter
              tag: 1.0.2@sha256:70d3999cbfdaf5f7575495afd165ac30243252092ea56030c2a3ec1f7373f34a
    service:
      app:
        ports:
          http:
            port: 11434
          metrics:
            port: 8000
    # route:
    #   app:
    #     hostnames:
    #       - "{{ .Release.Name }}.${SECRET_DOMAIN}"
    #     parentRefs:
    #       - name: envoy-internal
    #         namespace: network
    persistence:
      ollama:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /root/.ollama/models
            subPath: models
          - path: /root/.ollama
            subPath: config
