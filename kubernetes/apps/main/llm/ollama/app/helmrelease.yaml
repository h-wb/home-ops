---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ollama
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 1h
  values:
    defaultPodOptions:
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: ollama-gpu
    controllers:
      ollama:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ollama/ollama
              tag: 0.21.1@sha256:cd33c5656285ca365c9c5495fe0240a70aef642088c6427c461fd54b62f80ffb
            securityContext:
              privileged: true
            env:
              TZ: Europe/Paris
              OLLAMA_NUM_PARALLEL: 1
              OLLAMA_VULKAN: 1
              # OLLAMA_CONTEXT_LENGTH: "64000"
              OLLAMA_DEBUG: 1
              OLLAMA_KV_CACHE_TYPE: q8_0
              OLLAMA_FLASH_ATTENTION: 1
              GGML_VK_DISABLE_INTEGER_DOT_PRODUCT: 1
            resources:
              claims:
                - name: gpu
              requests:
                cpu: 200m
              limits:
                memory: 24Gi
          exporter:
            image:
              repository: lucabecker42/ollama-exporter
              tag: 1.0.1@sha256:4d1d96fae76dbefd6b763d576a12fb9799913ae9a585990a464eacab2b600f55
    service:
      app:
        ports:
          http:
            port: 11434
          metrics:
            port: 8000
    # route:
    #   app:
    #     hostnames:
    #       - "{{ .Release.Name }}.${SECRET_DOMAIN}"
    #     parentRefs:
    #       - name: envoy-internal
    #         namespace: network
    persistence:
      ollama:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /root/.ollama/models
            subPath: models
          - path: /root/.ollama
            subPath: config
