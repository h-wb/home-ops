---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app komga
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  values:
    controllers:
      komga:
        labels:
          nfsMount: "true"
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: gotson/komga
              tag: "1.25.0@sha256:c4f9885fc077e2e9cd684dc95e8f6cfa5e33b100b46712b2de7f5cc2ff59e6fb"
            env:
              TZ: Europe/Paris
              SERVER_PORT: &port 8080
              KOMGA_CORS_ALLOWED_ORIGINS: https://komf.${SECRET_DOMAIN}
              # OIDC via Kanidm. Client id/secret arrive via envFrom kanidm-komga-oidc
              # (keys are the two SPRING_..._CLIENT_ID/_SECRET names). Spring is a
              # confidential client and doesn't send PKCE → kanidm client disables it.
              SERVER_FORWARD_HEADERS_STRATEGY: framework
              SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KANIDM_CLIENT_NAME: Kanidm
              SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KANIDM_SCOPE: openid,email,profile
              SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KANIDM_CLIENT_AUTHENTICATION_METHOD: client_secret_basic
              SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KANIDM_REDIRECT_URI: "{baseUrl}/login/oauth2/code/kanidm"
              SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KANIDM_ISSUER_URI: https://idm.${SECRET_DOMAIN}/oauth2/openid/komga
              SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KANIDM_USER_NAME_ATTRIBUTE: email
            envFrom:
              - secretRef:
                  name: kanidm-komga-oidc
            resources:
              requests:
                cpu: 15m
                memory: 1Gi
              limits:
                memory: 4Gi
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Books
          gethomepage.dev/name: Komga
          gethomepage.dev/icon: komga.png
          gethomepage.dev/description: Comic/Ebook Web Reader
          gethomepage.dev/widget.type: komga
          gethomepage.dev/widget.url: http://komga.media:8080
          gethomepage.dev/widget.username: "{{ `{{HOMEPAGE_VAR_KOMGA_USERNAME}}` }}"
          gethomepage.dev/widget.password: "{{ `{{HOMEPAGE_VAR_KOMGA_PASSWORD}}` }}"
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: network
    persistence:
      config:
        existingClaim: *app
      media:
        type: nfs
        server: ${NFS_ADDR:=temp}
        path: /mnt/tank/shared
        globalMounts:
          - path: /data
            subPath: Literature
