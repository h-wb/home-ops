---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: clu
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  values:
    controllers:
      clu:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: allaboutduncan/comic-utils-web
              tag: latest@sha256:100d89304d7ba371533240fefbeb844a4afa725e80c00f65ef70783dc52d224b
            env:
              TZ: Europe/Paris
              PUID: "1000"
              PGID: "1000"
              UMASK: "022"
              FLASK_ENV: development
              MONITOR: no
            resources:
              requests:
                memory: 4282M
                cpu: 15m
              limits:
                memory: 4282M
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: 5577
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /config
      media:
        type: nfs
        server: ${NFS_ADDR:=temp}
        path: /mnt/tank/shared
        globalMounts:
          - path: /data
            subPath: Literature/Manga/Sources
