---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name codex-secret
spec:
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  refreshInterval: 15m
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        CODEX_AUTH_JWT_SECRET: "{{ .CODEX_AUTH_JWT_SECRET }}"
        CODEX_ENCRYPTION_KEY: "{{ .CODEX_ENCRYPTION_KEY }}"
  dataFrom:
    - extract:
        key: codex
