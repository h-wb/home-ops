---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app photon
spec:
  releaseName: photon
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  install:
    disableWait: true
  upgrade:
    disableWait: true
  values:
    controllers:
      photon:
        containers:
          app: &photon
            image:
              repository: ghcr.io/rtuszik/photon-docker
              tag: 2.3.0
            command: ["/photon/.venv/bin/python"]
            args: ["-m", "src.process_manager"]
            env:
              REGION: planet
              UPDATE_STRATEGY: SEQUENTIAL
              UPDATE_INTERVAL: 30d
              ENABLE_METRICS: "TRUE"
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /status
                    port: &port 2322
              readiness: *probe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /status
                    port: *port
                  failureThreshold: 1080 # ~3h grace for first planet index load
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                memory: "1Gi"
                cpu: "250m"
              limits:
                memory: "10Gi"
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    serviceMonitor:
      app:
        serviceName: *app
        endpoints:
          - port: http
            path: /metrics
    persistence:
      cache:
        type: emptyDir
        globalMounts:
          - path: /photon/.cache
      data:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /photon/data
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: photon
            patch: |
              - op: add
                path: /spec/progressDeadlineSeconds
                value: 7200
