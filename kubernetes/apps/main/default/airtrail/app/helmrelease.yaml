---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app airtrail
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  values:
    controllers:
      airtrail:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/johly/airtrail
              tag: v3.11.1
            env:
              ORIGIN: "https://{{ .Release.Name }}.${SECRET_DOMAIN}"
              UPLOAD_LOCATION: /app/uploads
              # AirTrail reads the full connection string from DB_URL; reuse the
              # CNPG-generated app secret so a rebuilt DB self-heals the password.
              DB_URL:
                valueFrom:
                  secretKeyRef:
                    name: postgres-airtrail-app
                    key: uri
              # OIDC via Kanidm. openid-client v6 → PKCE + ES256 native, so the
              # kanidm client keeps PKCE required and no legacy crypto. Auto-register
              # creates SSO users as role=user; the first admin must still be a local
              # account, and existing usernames must password-login once to link.
              OAUTH_ENABLED: "true"
              OAUTH_ISSUER_URL: "https://idm.${SECRET_DOMAIN}/oauth2/openid/airtrail/.well-known/openid-configuration"
              OAUTH_SCOPE: "openid email profile"
              OAUTH_BUTTON_TEXT: Log in with Kanidm
            envFrom:
              # OAUTH_CLIENT_ID / OAUTH_CLIENT_SECRET provisioned by kanidm-provision
              - secretRef:
                  name: kanidm-airtrail-oidc
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 3000
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 25m
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Home
          gethomepage.dev/name: AirTrail
          gethomepage.dev/icon: airtrail.png
          gethomepage.dev/description: Flight tracking
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      uploads:
        existingClaim: *app
        globalMounts:
          - path: /app/uploads
