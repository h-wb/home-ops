---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app paperless-gpt
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      paperless-gpt:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/icereed/paperless-gpt
              tag: v0.25.1@sha256:c0ce6186028911101a2cfe68353f14a9dbb2653596f3f1cff94de4b6db3114ff
            env:
              TZ: Europe/Paris
              PAPERLESS_BASE_URL: http://paperless.default.svc.cluster.local:8000
              OLLAMA_HOST: http://open-webui.llm.svc.cluster.local:8080
              # LLM Configuration
              LLM_LANGUAGE: English
              LLM_PROVIDER: ollama
              LLM_MODEL: qwen3.5:0.8b
              OCR_PROVIDER: llm
              VISION_LLM_PROVIDER: ollama
              VISION_LLM_MODEL: minicpm-v:8b
              # Document Processing Settings
              AUTO_GENERATE_TITLE: false
              AUTO_GENERATE_TAGS: false
              AUTO_GENERATE_CORRESPONDANTS: false
              AUTO_GENERATE_DOCUMENT_TYPE: false
              AUTO_GENERATE_CREATED_DATE: false
              # Tagging Settings
              AUTO_TAG: _paperless-gpt_auto_
              AUTO_OCR_TAG: _paperless-gpt_ocr-auto_
              MANUAL_TAG: _paperless-gpt_manual_
              PDF_OCR_TAGGING: true
              PDF_OCR_COMPLETE_TAG: _paperless-gpt_ocr-complete_
              # OCR Settings
              OCR_LIMIT_PAGES: 50
              OCR_PROCESS_MODE: image
              PDF_SKIP_EXISTING_OCR: false
              # Enhanced OCR Settings
              PDF_UPLOAD: true
              PDF_COPY_METADATA: true
              PDF_REPLACE: false
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 893Mi
              limits:
                memory: 893Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: &port 8080
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          paperless-gpt:
            app:
              - path: /app/db
                subPath: db
              - path: /app/prompts
                subPath: prompts
      tmpfs:
        type: emptyDir
        advancedMounts:
          paperless-gpt:
            app:
              - path: /app/config
                subPath: config
              - path: /tmp
                subPath: tmp
