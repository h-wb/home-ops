---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app reitti
spec:
  releaseName: reitti
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  values:
    controllers:
      reitti:
        containers:
          app: &reitti
            image:
              repository: dedicatedcode/reitti
              tag: 4.0.5
            env:
              POSTGIS_DB: *app
              POSTGIS_PORT: 5432
              POSTGIS_HOST: postgres-reitti-rw.default.svc
              POSTGIS_USER: *app
              POSTGIS_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: postgres-reitti-app
                    key: password
              REDIS_HOST: "reitti-dragonfly.default.svc.cluster.local"
              REDIS_PORT: 6379
              # PHOTON_BASE_URL: http://photon.default:2322
            envFrom:
              - secretRef:
                  name: reitti-secret
            resources:
              requests:
                memory: "1Gi"
                cpu: "250m"
              limits:
                memory: "3Gi"
                cpu: "2000m"
    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 8080
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Home
          gethomepage.dev/name: reitti
          gethomepage.dev/icon: google-maps.png
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: network
