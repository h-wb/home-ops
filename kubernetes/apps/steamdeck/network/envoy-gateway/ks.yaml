---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-gateway
  namespace: network
spec:
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
    - name: certificates
      namespace: network
  interval: 1h
  path: ./kubernetes/apps/main/network/envoy-gateway/app
  postBuild:
    substitute:
      CLUSTER: ${CLUSTER}
      EXTERNAL_DOMAIN: ${CLUSTER}-external
      INTERNAL_DOMAIN: ${CLUSTER}-internal
      SVC_GATEWAY_EXTERNAL: 192.168.18.200
      SVC_GATEWAY_INTERNAL: 192.168.18.202
    substituteFrom:
      - kind: Secret
        name: cluster-secrets
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: network
  timeout: 5m
  wait: false
