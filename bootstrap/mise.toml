[env]
BOOTSTRAP_DIR = "{{config_root}}/"

[tasks.talos]
description = "Install Talos"
run = '''
#!/usr/bin/env bash
nodes=$(talosctl config info -o yaml | yq -e '.nodes | join (" ")')
mise //:log info "Running stage..." stage "$0"
for n in ${nodes}; do
    if ! op=$(mise run //talos:apply-node "$n" --insecure 2>&1); then
        if [[ "$op" == *"certificate required"* ]]; then
            mise //:log info "Talos already configured, skipping apply of config" stage "$0" node "$n"
            continue
        fi
        mise //:log fatal "Failed to apply Talos configuration" stage "$0" node "$n" output "$op"
    fi
done
'''

[tasks.k8s]
description = "Install Kubernetes"
run = '''
#!/usr/bin/env bash
controller=$(talosctl config info -o yaml | yq -e '.endpoints[0]')
mise //:log info "Running stage..." stage "$0"
until op=$(talosctl -n "${controller}" bootstrap 2>&1 || true) && [[ "$op" == *"AlreadyExists"* ]]; do
    mise //:log info "Kubernetes bootstrap in progress. Retrying in 5 seconds..." stage "$0"
    sleep 5
done
'''

[tasks.kubeconfig]
description = "Fetch kubeconfig"
usage = '''
arg "[lb]" default="cilium" env="LB"
'''
run = '''
#!/usr/bin/env bash
controller=$(talosctl config info -o yaml | yq -e '.endpoints[0]')
mise //:log info "Running stage..." stage "$0"
if ! talosctl kubeconfig -n "${controller}" -f --force-context-name "${CLUSTER}" "${PWD}"; then
    mise //:log fatal "Failed to fetch kubeconfig" stage "$0"
fi
if [[ "${usage_lb}" != "cilium" ]]; then
    if ! kubectl config set-cluster "${CLUSTER}" --server "https://${controller}:6443"; then
        mise //:log fatal "Failed to set kubectl cluster server address" stage "$0"
    fi
fi
'''

[tasks.wait]
description = "Wait for nodes to be not-ready"
run = '''
#!/usr/bin/env bash
mise //:log info "Running stage..." stage "$0"
if ! kubectl wait nodes --for=condition=Ready=True --all --timeout=10s &>/dev/null; then
    until kubectl wait nodes --for=condition=Ready=False --all --timeout=10s &>/dev/null; do
        mise //:log info "Nodes not available, waiting for nodes to be available. Retrying in 5 seconds..." stage "$0"
        sleep 5
    done
fi
'''

[tasks.namespaces]
description = "Apply Kubernetes namespaces"
run = '''
#!/usr/bin/env bash
mise //:log info "Running stage..." stage "$0"
find "${KUBERNETES_DIR}/apps" -mindepth 1 -maxdepth 1 -type d | while IFS= read -r dir; do
    if ! kustomize build "$dir" | yq ea -e 'select(.kind == "Namespace")' | kubectl apply --server-side --field-manager bootstrap --force-conflicts -f -; then
        mise //:log fatal "Failed to apply namespace" stage "$0" namespace "$(basename "$dir")"
    fi
done
'''

[tasks.resources]
description = "Apply Kubernetes resources"
run = '''
#!/usr/bin/env bash
mise //:log info "Running stage..." stage "$0"
RESOURCES="${BOOTSTRAP_DIR}/resources.${CLUSTER}.yaml.j2"
[[ -f "${RESOURCES}" ]] || RESOURCES="${BOOTSTRAP_DIR}/resources.yaml.j2"
if ! mise run //:template "${RESOURCES}" | kubectl apply --server-side --field-manager bootstrap --force-conflicts -f -; then
    mise //:log fatal "Failed to apply resources" stage "$0"
fi
'''

[tasks.crds]
description = "Apply Helmfile CRDs"
run = '''
#!/usr/bin/env bash
mise //:log info "Running stage..." stage "$0"
CRDS_FILE="${BOOTSTRAP_DIR}/helmfile.d/${CLUSTER}/00-crds.yaml"
[[ -f "${CRDS_FILE}" ]] || CRDS_FILE="${BOOTSTRAP_DIR}/helmfile.d/00-crds.yaml"
if ! helmfile -f "${CRDS_FILE}" template -q | yq ea -e 'select(.kind == "CustomResourceDefinition")' | kubectl apply --server-side --field-manager bootstrap --force-conflicts -f -; then
    mise //:log fatal "Failed to apply crds" stage "$0"
fi
'''

[tasks.apps]
description = "Apply Helmfile Apps"
run = '''
#!/usr/bin/env bash
mise //:log info "Running stage..." stage "$0"
APPS_FILE="${BOOTSTRAP_DIR}/helmfile.d/${CLUSTER}/01-apps.yaml"
[[ -f "${APPS_FILE}" ]] || APPS_FILE="${BOOTSTRAP_DIR}/helmfile.d/01-apps.yaml"
if ! helmfile -e "${CLUSTER}" -f "${APPS_FILE}" sync --hide-notes; then
    mise //:log fatal "Failed to sync helmfile" stage "$0"
fi
'''

[tasks.cloudflare-tunnel]
description = "Login to Cloudflare and create a tunnel for the current cluster"
usage = '''
arg "[name]" help="Tunnel name (default: kubernetes-<cluster>)"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

TUNNEL_NAME="${usage_name:-kubernetes-${CLUSTER}}"
CRED_FILE="${BOOTSTRAP_DIR}/cloudflare-tunnel-${CLUSTER}.json"

mise //:log info "Running stage..." stage "$0" tunnel "${TUNNEL_NAME}"

if [[ ! -f "${HOME}/.cloudflared/cert.pem" ]]; then
    mise //:log info "Logging in to Cloudflare (browser will open)..." stage "$0"
    cloudflared tunnel login
fi

if [[ -f "${CRED_FILE}" ]]; then
    mise //:log info "Credentials file already exists, reusing" stage "$0" file "${CRED_FILE}"
else
    mise //:log info "Creating tunnel..." stage "$0" tunnel "${TUNNEL_NAME}"
    cloudflared tunnel create --credentials-file "${CRED_FILE}" "${TUNNEL_NAME}"
fi

TUNNEL_ID=$(jq -r '.TunnelID' "${CRED_FILE}")
TUNNEL_SECRET=$(jq -rc '{a: .AccountTag, t: .TunnelID, s: .TunnelSecret}' "${CRED_FILE}" | base64)
PREFIX=$(echo "${CLUSTER}" | tr '[:lower:]' '[:upper:]')

mise //:log info "Tunnel ready. Add these to the BWS cloudflare item:" stage "$0"
echo "  ${PREFIX}_CLOUDFLARE_TUNNEL_ID=${TUNNEL_ID}"
echo "  ${PREFIX}_CLOUDFLARE_TUNNEL_SECRET=${TUNNEL_SECRET}"
'''
